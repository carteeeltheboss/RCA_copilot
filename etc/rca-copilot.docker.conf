[database]
connection = mongodb://rca_admin:change-me@mongodb:27017/rca_copilot?authSource=admin
name = rca_copilot

[api]
bind_host = 0.0.0.0
bind_port = 8000

[parser]
health_file = /tmp/rca-copilot-parser-worker.health

[correlation]
health_file = /tmp/rca-copilot-correlation-worker.health

[incident]
health_file = /tmp/rca-copilot-incident-worker.health

[enrichment]
health_file = /tmp/rca-copilot-enrichment-worker.health

[provider]
allow_localhost = false
