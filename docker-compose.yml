name: rca_copilot

services:
  mongodb:
    image: mongo:7.0.12
    container_name: rca-copilot-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-rca_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change-me}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-rca_copilot}
    ports:
      - "${MONGO_BIND_HOST:-127.0.0.1}:${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok' mongodb://$${MONGO_INITDB_ROOT_USERNAME}:$${MONGO_INITDB_ROOT_PASSWORD}@localhost:27017/admin | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rca-copilot-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./etc/rca-copilot.docker.conf:/etc/rca-copilot/rca-copilot.conf:ro
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  parser-worker:
    build:
      context: .
      dockerfile: parser_worker/Dockerfile
    container_name: rca-copilot-parser-worker
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./etc/rca-copilot.docker.conf:/etc/rca-copilot/rca-copilot.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -m parser_worker.healthcheck --config-file /etc/rca-copilot/rca-copilot.conf",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  correlation-worker:
    build:
      context: .
      dockerfile: correlation_worker/Dockerfile
    container_name: rca-copilot-correlation-worker
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./etc/rca-copilot.docker.conf:/etc/rca-copilot/rca-copilot.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -m correlation_worker.healthcheck --config-file /etc/rca-copilot/rca-copilot.conf",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  incident-worker:
    build:
      context: .
      dockerfile: incident_worker/Dockerfile
    container_name: rca-copilot-incident-worker
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./etc/rca-copilot.docker.conf:/etc/rca-copilot/rca-copilot.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -m incident_worker.healthcheck --config-file /etc/rca-copilot/rca-copilot.conf",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  enrichment-worker:
    build:
      context: .
      dockerfile: enrichment_worker/Dockerfile
    container_name: rca-copilot-enrichment-worker
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./etc/rca-copilot.docker.conf:/etc/rca-copilot/rca-copilot.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -m enrichment_worker.healthcheck --config-file /etc/rca-copilot/rca-copilot.conf",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongodb_data:
